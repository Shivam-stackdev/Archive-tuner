name: Build APKs

on:
workflow_dispatch:
push:
branches: [ "main", "dev" ]
paths-ignore:
- "README.md"
- "fastlane/"
- "assets/"
- ".github//*.md"
- ".github/FUNDING.yml"
- ".github/ISSUE_TEMPLATE/"

permissions:
contents: write
discussions: write
actions: write

jobs:

build:
if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
runs-on: ubuntu-latest

strategy:
  matrix:
    abi: [ "arm64", "armeabi", "x86", "x86_64", "universal" ]

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: "temurin"
      java-version: "17"

  - name: Setup Gradle
    uses: gradle/actions/setup-gradle@v3

  - name: Grant execute permission
    run: chmod +x gradlew

  - name: Clean project
    run: ./gradlew clean

  - name: Build Release APK
    run: ./gradlew assemble${{ matrix.abi }}Release
    env:
      PULL_REQUEST: "false"
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
      TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}

  - name: Sign APK
    uses: ilharp/sign-android-release@v1
    with:
      releaseDir: app/build/outputs/apk/${{ matrix.abi }}/release/
      signingKey: ${{ secrets.KEYSTORE }}
      keyAlias: ${{ secrets.KEY_ALIAS }}
      keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
      keyPassword: ${{ secrets.KEY_PASSWORD }}

  - name: Move signed APK
    run: |
      mkdir -p out
      find app/build/outputs/apk/${{ matrix.abi }}/release/ -name "*.apk" -exec cp {} out/app-${{ matrix.abi }}-release.apk \;

  - name: Upload Signed APK
    uses: actions/upload-artifact@v4
    with:
      name: app-${{ matrix.abi }}-release
      path: out/app-${{ matrix.abi }}-release.apk

build_debug:
if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
runs-on: ubuntu-latest

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: "temurin"
      java-version: "17"

  - name: Setup Gradle
    uses: gradle/actions/setup-gradle@v3

  - name: Grant execute permission
    run: chmod +x gradlew

  - name: Clean project
    run: ./gradlew clean

  - name: Build Debug APK
    run: ./gradlew assembleUniversalDebug
    env:
      PULL_REQUEST: "false"
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}
      TOGETHER_BEARER_TOKEN: ${{ secrets.TOGETHER_BEARER_TOKEN }}

  - name: Upload Debug APK
    uses: actions/upload-artifact@v4
    with:
      name: app-universal-debug
      path: app/build/outputs/apk/universal/debug/*.apk
